context:
  version: "0.3.0rc1"

package:
  name: "stare-atlas"
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/stare/stare-${{ version }}.tar.gz
  sha256: 07d5fdcb26480d2d522d263f2bc07744df315f23c2e9d30f90b371a1ba40a305

build:
  noarch: python
  script: python -m pip install . -vv
  number: 1
  python:
    entry_points:
      - stare = stare.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - httpx
    - hishel
    - keyring
    - pyjwt
    - cryptography
    - filelock
    - pydantic >=2
    - pydantic-settings >=2
    - typer
    - rich
    - platformdirs
    - lark
    - tomli  # drop when python_min >= 3.11

tests:
  - python:
      imports:
        - stare
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      stare --help

about:
  homepage: https://github.com/kratsg/stage
  summary: 'Python library and CLI for the CERN ATLAS Glance/Fence API'
  description: |
    stare is a Python library and CLI for the CERN ATLAS Glance/Fence API.
    It provides typed access to analyses, papers, CONF notes, PUB notes,
    publications, groups, subgroups, and triggers — with OAuth2 PKCE authentication
    against CERN Keycloak built in.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  documentation: https://stare-atlas.readthedocs.io/
  repository: https://github.com/kratsg/stare

extra:
  recipe-maintainers:
    - kratsg
