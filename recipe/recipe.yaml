context:
  version: "0.3.0rc2"

package:
  name: "stare-atlas"
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/s/stare/stare-${{ version }}.tar.gz
  sha256: 2c77b245bbcb86e1ca5997b5d3c5a548c981be572892bcfe0d933a9691ca18a2

build:
  noarch: python
  script: python -m pip install . -vv
  number: 0
  python:
    entry_points:
      - stare = stare.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >=${{ python_min }}
    - httpx
    - hishel
    - keyring
    - pyjwt
    - cryptography
    - filelock
    - pydantic >=2
    - pydantic-settings >=2
    - typer
    - rich
    - platformdirs
    - lark
    - tomli  # drop when python_min >= 3.11

tests:
  - python:
      imports:
        - stare
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      stare --help

about:
  homepage: https://github.com/kratsg/stage
  summary: 'Python library and CLI for the CERN ATLAS Glance/Fence API'
  description: |
    stare is a Python library and CLI for the CERN ATLAS Glance/Fence API.
    It provides typed access to analyses, papers, CONF notes, PUB notes,
    publications, groups, subgroups, and triggers — with OAuth2 PKCE authentication
    against CERN Keycloak built in.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  documentation: https://stare-atlas.readthedocs.io/
  repository: https://github.com/kratsg/stare

extra:
  recipe-maintainers:
    - kratsg
